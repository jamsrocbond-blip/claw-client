name: Build macOS

# 触发方式：
# 1. 手动触发（在 GitHub 网页上点 "Run workflow"）
# 2. 推送 tag（如 git tag v0.1.0 && git push --tags）
on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - 'v*'           # 推送 v 开头的 tag 时自动触发

jobs:
  build-mac:
    runs-on: macos-latest   # GitHub 提供的免费 macOS 虚拟机

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/renderer/package-lock.json

      # 3. 生成 macOS 图标（从 logo.png 转换）
      - name: Generate macOS icon
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     build-resources/logo.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     build-resources/logo.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build-resources/logo.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     build-resources/logo.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build-resources/logo.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   build-resources/logo.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build-resources/logo.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   build-resources/logo.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   build-resources/logo.png --out icon.iconset/icon_512x512.png
          cp build-resources/logo.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o build-resources/icon.icns
          echo "icon.icns generated"

      # 4. 写入生产环境配置（从 GitHub Secrets 注入，不提交到代码库）
      - name: Create .env.production
        run: |
          cat > .env.production << 'EOF'
          CLAW_SERVER_HOST=${{ secrets.CLAW_SERVER_HOST }}
          CLAW_API_URL=${{ secrets.CLAW_API_URL }}
          CLAW_GATEWAY_URL=${{ secrets.CLAW_GATEWAY_URL }}
          CLAW_GATEWAY_TOKEN=${{ secrets.CLAW_GATEWAY_TOKEN }}
          VITE_API_URL=${{ secrets.CLAW_API_URL }}
          VITE_GATEWAY_URL=${{ secrets.CLAW_GATEWAY_URL }}
          VITE_GATEWAY_TOKEN=${{ secrets.CLAW_GATEWAY_TOKEN }}
          EOF

      # 4. 安装主进程依赖
      - name: Install main dependencies
        run: npm ci

      # 5. 安装渲染进程依赖
      - name: Install renderer dependencies
        run: npm ci
        working-directory: src/renderer

      # 6. 构建主进程
      - name: Build main process
        run: npm run build:main

      # 7. 构建 preload
      - name: Build preload
        run: npm run build:preload

      # 8. 构建渲染进程
      - name: Build renderer
        run: npm run build:renderer

      # 9. 打包 macOS DMG（不签名，无需 Apple 开发者账号）
      - name: Package macOS DMG
        run: npx electron-builder --mac --publish never
        env:
          # 跳过代码签名（没有 Apple 开发者证书时必须设置）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 10. 上传构建产物（在 GitHub Actions 页面可以下载）
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawComply-macOS
          path: release/*.dmg
          retention-days: 30   # 保留 30 天

      # 11. 如果是 tag 触发，自动创建 GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          name: ClawComply ${{ github.ref_name }}
          draft: false
          prerelease: false
